<!DOCTYPE html>

<html lang="pt-BR">
<head>
<script defer data-domain="dradeborameireles.netlify.app" src="https://plausible.io/js/script.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dra. Débora Meireles</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { background:#0e0a09; }
body {
  min-height:100vh;
  font-family:'Montserrat',sans-serif;
  display:flex;
  justify-content:center;
}
.page {
  width:100%;
  max-width:480px;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

/* ── HERO ── */
.hero {
width:100%;
height:460px;
position:relative;
overflow:hidden;
flex-shrink:0;
}
.hero img.photo {
width:100%;
height:100%;
object-fit:cover;
object-position:center 8%;
display:block;
}
.hero-veil {
position:absolute;
inset:0;
background:linear-gradient(
to bottom,
rgba(14,10,9,.1) 0%,
rgba(14,10,9,.2) 45%,
rgba(14,10,9,.88) 82%,
#0e0a09 100%
);
}

/* ── LOGO INICIAIS ── */
.logo-wrap {
position:absolute;
bottom:24px;
left:50%;
transform:translateX(-50%);
width:130px;
height:130px;
}
.logo-wrap img {
width:100%;
height:100%;
object-fit:contain;
/* logo é branca — aparece perfeitamente no fundo escuro */
}

/* ── BODY ── */
.body {
width:100%;
background:#0e0a09;
display:flex;
flex-direction:column;
align-items:center;
padding:6px 32px 80px;
flex:1;
}

.orn {
width:40px;
height:0.5px;
background:linear-gradient(to right, transparent, #AD947E, transparent);
margin:22px 0 20px;
}

.name {
font-family:‘Cormorant Garamond’,serif;
font-weight:400;
font-size:26px;
letter-spacing:1px;
color:#FCFCFC;
text-align:center;
margin-bottom:10px;
}

.title {
font-family:‘Montserrat’,sans-serif;
font-weight:200;
font-size:10px;
letter-spacing:4px;
text-transform:uppercase;
color:#AD947E;
text-align:center;
line-height:2;
margin-bottom:8px;
}

.handle {
font-family:‘Montserrat’,sans-serif;
font-weight:300;
font-size:12px;
color:rgba(210,192,182,.4);
letter-spacing:1px;
margin-bottom:44px;
}

/* ── BOTÕES ── */
.buttons {
width:100%;
display:flex;
flex-direction:column;
gap:13px;
}

.btn {
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
padding:19px 26px;
border-radius:3px;
text-decoration:none;
font-family:‘Montserrat’,sans-serif;
font-weight:300;
font-size:11px;
letter-spacing:4px;
text-transform:uppercase;
transition:transform .2s, opacity .2s;
}
.btn:hover { transform:translateY(-2px); opacity:.88; }
.btn-inner { display:flex; align-items:center; gap:14px; }
.btn svg { width:17px; height:17px; flex-shrink:0; }
.chevron { font-size:15px; opacity:.4; }

.btn-1 { background:#AD947E; color:#fff; }
.btn-2 { background:transparent; color:#D2C0B6; border:0.5px solid rgba(173,148,126,.5); }
.btn-3 { background:rgba(157,113,102,.12); color:#D2C0B6; border:0.5px solid rgba(157,113,102,.3); }

/* ── RODAPÉ ── */
.footer {
margin-top:48px;
font-family:‘Montserrat’,sans-serif;
font-weight:200;
font-size:9px;
letter-spacing:3px;
text-transform:uppercase;
color:rgba(173,148,126,.25);
}
</style>

</head>
